name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: dist/mkvsyncdub.exe
            asset: mkvsyncdub-windows.exe
          - os: macos-latest
            artifact: dist/mkvsyncdub
            asset: mkvsyncdub-macos
          - os: ubuntu-latest
            artifact: dist/mkvsyncdub
            asset: mkvsyncdub-linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Qt system libraries (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libxcb-xinerama0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-xkb1 libxkbcommon-x11-0 libgl1

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller pyinstaller-hooks-contrib

      - name: Build
        run: python -m PyInstaller mkvsyncdub.spec --clean

      - name: Rename artifact
        shell: bash
        run: mv "${{ matrix.artifact }}" "dist/${{ matrix.asset }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
